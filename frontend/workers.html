<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Worker · WageSheet</title>
  <style>
    :root {
      --ink:#18212b; --muted:#697683; --line:#d7e2ea; --brand:#d97706;
      --teal:#f59e0b; --green:#1f9f72; --blue:#1e6fb5; --danger:#d3435c;
      --panel:#fbfdff; --surface:#fffbeb; --shadow:0 18px 44px rgba(18,31,43,.13);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;color:var(--ink);background:linear-gradient(135deg,#fffdf5 0%,#fef3c7 40%,#f0fdf4 100%);background-attachment:fixed}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 10% 8%,rgba(217,119,6,.16),transparent 22rem),radial-gradient(circle at 90% 10%,rgba(31,159,114,.14),transparent 20rem),linear-gradient(90deg,rgba(24,33,43,.025) 1px,transparent 1px),linear-gradient(rgba(24,33,43,.025) 1px,transparent 1px);background-size:auto,auto,72px 72px,72px 72px}
    button,input,select,textarea{font:inherit}button{cursor:pointer}
    .app{min-height:100vh;display:grid;grid-template-columns:268px minmax(0,1fr)}
    .sidebar{position:sticky;top:0;height:100vh;padding:22px 16px;background:rgba(255,253,245,.94);border-right:1px solid rgba(215,226,234,.9);backdrop-filter:blur(18px);overflow:auto;z-index:2}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}
    .brand-cube{width:48px;height:48px;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:13px;background:linear-gradient(145deg,var(--brand),#92400e 58%,#1f9f72);box-shadow:0 15px 30px rgba(217,119,6,.28);transform:rotateX(16deg) rotateY(-18deg);animation:cubeFloat 5s ease-in-out infinite}
    .brand h1{margin:0;font-size:1.06rem;line-height:1.15}.brand span{color:var(--muted);font-size:.78rem}

    /* Worker profile card */
    .worker-profile{background:linear-gradient(135deg,var(--brand),#92400e);border-radius:12px;padding:16px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
    .worker-profile:before{content:"";position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.1)}
    .worker-profile:after{content:"";position:absolute;right:10px;bottom:-10px;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.07)}
    .wp-avatar{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.25);display:grid;place-items:center;font-weight:900;font-size:18px;margin-bottom:10px}
    .wp-name{font-size:1rem;font-weight:700;margin-bottom:2px}
    .wp-meta{font-size:.76rem;opacity:.85}
    .wp-id{display:inline-block;margin-top:8px;background:rgba(255,255,255,.18);border-radius:6px;padding:3px 9px;font-size:.7rem;font-weight:700;letter-spacing:.05em}

    .side-title{margin:18px 8px 9px;color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em}
    .nav{display:grid;gap:5px}.nav button{width:100%;min-height:46px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--ink);text-align:left;padding:9px 10px;display:grid;gap:2px;transition:.2s ease}
    .nav button:hover,.nav button.active{background:linear-gradient(135deg,#fff,#fffbeb);border-color:rgba(217,119,6,.22);box-shadow:0 9px 22px rgba(18,31,43,.09);transform:translateX(4px)}
    .nav small{color:var(--muted);font-size:.72rem}

    main{min-width:0;padding:24px}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px}
    .headline h2{margin:0 0 7px;font-size:clamp(1.55rem,3vw,2.5rem);line-height:1.04}.headline p{margin:0;max-width:820px;color:var(--muted);line-height:1.5}
    .tools{min-width:min(360px,100%);display:grid;gap:10px;justify-items:end}
    .search{width:100%;min-height:42px;border:1px solid var(--line);border-radius:8px;padding:0 13px;background:#fff;color:var(--ink);outline:none;box-shadow:0 10px 24px rgba(18,31,43,.06)}
    .search:focus{border-color:rgba(217,119,6,.55);box-shadow:0 0 0 4px rgba(217,119,6,.12)}
    .file-meta{font-size:.78rem;color:var(--muted);text-align:right}

    .kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:14px;margin-bottom:18px}
    .kpi{position:relative;min-height:126px;padding:16px;border:1px solid rgba(215,226,234,.95);border-radius:12px;background:linear-gradient(145deg,#fff,var(--surface));box-shadow:var(--shadow);animation:cardIn .55s ease both;overflow:hidden;cursor:pointer;transition:transform .3s ease,box-shadow .3s ease}
    .kpi:before{content:"";position:absolute;inset:0 0 auto;height:4px;background:linear-gradient(90deg,var(--tone),color-mix(in srgb,var(--tone) 55%,transparent))}
    .kpi:after{content:"";position:absolute;right:-22px;bottom:-22px;width:78px;height:78px;border-radius:18px;background:color-mix(in srgb,var(--tone) 12%,transparent);transform:rotate(24deg);transition:transform .3s ease}
    .kpi:hover{transform:translateY(-8px) rotateX(8deg) rotateY(-6deg);box-shadow:0 28px 60px rgba(18,31,43,.2)}
    .kpi small{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:.66rem}
    .kpi strong{display:block;margin-top:13px;font-size:clamp(1.32rem,2.3vw,1.95rem);line-height:1}
    .kpi span{display:block;margin-top:9px;color:var(--muted);font-size:.82rem}
    .kpi-sparkline{position:absolute;bottom:0;left:0;right:0;height:36px;opacity:.18}
    .progress-bar{height:6px;background:#fde68a;border-radius:3px;overflow:hidden;margin-top:5px}
    .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--brand),var(--teal));transition:width 1s cubic-bezier(.2,.8,.2,1)}

    .layout{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(300px,.7fr);gap:18px;align-items:start}
    .stack{display:grid;gap:18px}
    .panel{border:1px solid rgba(215,226,234,.95);border-radius:12px;background:rgba(255,253,245,.94);box-shadow:var(--shadow);overflow:hidden;animation:panelRise .5s ease both}
    .panel-head{min-height:62px;padding:15px 17px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,rgba(217,119,6,.07),transparent)}
    .panel-head h3{margin:0;font-size:1rem}.panel-head span{display:block;color:var(--muted);font-size:.78rem;margin-top:3px}
    .module-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:16px}
    .module{min-height:140px;border:1px solid var(--line);border-radius:10px;padding:14px;background:#fff;transition:.22s ease}
    .module:hover{transform:translateY(-4px);box-shadow:0 14px 28px rgba(18,31,43,.09)}.module h4{margin:0 0 10px;font-size:.95rem}
    .module ul{margin:0;padding:0;list-style:none;display:grid;gap:7px;color:#405161;font-size:.84rem}
    .module li:before{content:"";display:inline-block;width:7px;height:7px;border-radius:2px;background:var(--brand);margin-right:8px}
    .quick-actions{padding:16px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .action-btn{min-height:48px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:0 12px;text-align:left;transition:.2s ease;font-size:.85rem}
    .action-btn:hover{background:linear-gradient(135deg,var(--brand),#92400e);border-color:var(--brand);color:#fff;transform:translateY(-3px);box-shadow:0 14px 25px rgba(217,119,6,.22)}

    /* Wage slip highlight card */
    .wageslip-hero{margin:0 16px 16px;border-radius:12px;background:linear-gradient(135deg,var(--brand),#92400e);color:#fff;padding:18px;position:relative;overflow:hidden}
    .wageslip-hero:before{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
    .wageslip-hero h4{margin:0 0 12px;font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;opacity:.8}
    .ws-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.15);font-size:.84rem}
    .ws-row:last-child{border:none;margin-top:6px;padding-top:10px}
    .ws-row b{font-size:1.1rem}
    .ws-row span{opacity:.85}

    /* Attendance calendar stub */
    .attendance-cal{padding:14px 16px}
    .cal-month{font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:10px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .cal-day{height:28px;border-radius:6px;display:grid;place-items:center;font-size:.68rem;font-weight:700}
    .cal-hdr{color:var(--muted);font-size:.62rem;text-align:center;padding:0}
    .cal-present{background:#d1fae5;color:#1f9f72}
    .cal-absent{background:#fde8ec;color:#d3435c}
    .cal-empty{background:transparent;color:var(--muted);opacity:.4}
    .cal-future{background:#f5f5f5;color:#aaa}
    .cal-today{background:var(--brand);color:#fff;box-shadow:0 4px 10px rgba(217,119,6,.3)}

    /* chart */
    .analytics-stage{min-height:320px;padding:0;display:flex;flex-direction:column}
    .chart-controls{display:flex;align-items:center;gap:10px;padding:14px 18px 0;flex-wrap:wrap}
    .chart-type-btn{padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:#fff;font-size:.76rem;color:var(--muted);cursor:pointer;transition:.18s ease}
    .chart-type-btn.active,.chart-type-btn:hover{background:var(--brand);color:#fff;border-color:var(--brand)}
    .bars3d-wrap{width:100%;height:260px;position:relative;perspective:900px;overflow:hidden;background:linear-gradient(180deg,rgba(217,119,6,.03),rgba(254,243,199,.5))}
    .bars3d-stage{width:100%;height:100%;transform-style:preserve-3d;transform:rotateX(12deg) rotateY(-4deg);animation:stageFloat 9s ease-in-out infinite;display:flex;align-items:flex-end;justify-content:center;gap:clamp(10px,1.8vw,22px);padding:20px 24px 44px}
    .bar-group{display:flex;flex-direction:column;align-items:center;position:relative;transform-style:preserve-3d}
    .bar3d{position:relative;width:clamp(40px,7vw,62px);transform-style:preserve-3d;border-radius:6px 6px 2px 2px;cursor:pointer;transition:filter .2s}
    .bar3d:hover{filter:brightness(1.12)}
    .bar3d-front{position:absolute;inset:0;border-radius:6px 6px 2px 2px;background:linear-gradient(180deg,color-mix(in srgb,var(--c) 78%,white) 0%,var(--c) 52%,color-mix(in srgb,var(--c) 72%,#0a1018) 100%)}
    .bar3d-side{position:absolute;top:6px;right:-12px;width:12px;bottom:0;background:color-mix(in srgb,var(--c) 62%,#0a1018);transform-origin:left;transform:skewY(48deg);border-radius:0 4px 2px 0}
    .bar3d-top{position:absolute;top:-9px;left:5px;right:0;height:9px;background:color-mix(in srgb,var(--c) 82%,white);transform-origin:bottom;transform:skewX(48deg);border-radius:4px 4px 0 0}
    .bar3d-glow{position:absolute;inset:0;border-radius:6px 6px 2px 2px;background:linear-gradient(180deg,rgba(255,255,255,.22),transparent 60%);pointer-events:none}
    .bar3d-val{position:absolute;top:-38px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.7rem;font-weight:800;padding:4px 7px;background:#fff;border:1px solid rgba(215,226,234,.9);border-radius:6px;box-shadow:0 8px 18px rgba(18,31,43,.12);color:var(--ink);opacity:0;transition:opacity .2s}
    .bar-group:hover .bar3d-val{opacity:1}
    .bar3d-track{width:100%;height:6px;border-radius:3px;background:color-mix(in srgb,var(--c) 18%,#d7e2ea);margin-top:2px}
    .bar3d-label{margin-top:12px;font-size:.7rem;font-weight:700;color:#405161;text-align:center;line-height:1.2;max-width:88px}
    .chart-legend{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;padding:10px 16px 14px}
    .legend-pill{display:inline-flex;align-items:center;gap:7px;min-height:26px;padding:3px 9px;border:1px solid var(--line);border-radius:999px;background:#fff;color:#405161;font-size:.74rem;font-weight:700}
    .legend-dot{width:10px;height:10px;border-radius:3px;background:var(--c)}

    /* donut */
    .donut3d-wrap{width:100%;height:260px;display:flex;align-items:center;justify-content:center;gap:20px;padding:8px 14px}
    .donut3d-canvas{width:160px;height:160px;flex-shrink:0}
    .donut3d-canvas svg{width:100%;height:100%;filter:drop-shadow(0 12px 18px rgba(18,31,43,.18))}
    .donut3d-legend{display:flex;flex-direction:column;gap:9px;flex:1;min-width:0}
    .donut3d-leg-item{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:8px;transition:.18s ease}
    .donut3d-leg-item:hover{background:rgba(217,119,6,.07)}
    .donut3d-leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
    .donut3d-leg-label{font-size:.8rem;color:#405161;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .donut3d-leg-val{font-size:.8rem;font-weight:700;color:var(--ink)}
    .line-chart-wrap{width:100%;height:260px;position:relative;padding:10px 14px 8px}
    .gauges-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
    .gauge-item{display:flex;flex-direction:column;align-items:center;gap:6px}
    .gauge-svg{width:100%;max-width:115px}
    .gauge-label{font-size:.72rem;color:var(--muted);text-align:center}

    /* alerts */
    .alerts{padding:10px 14px 14px;display:grid;gap:9px}
    .alert-card{border-radius:10px;border:1px solid var(--al-border);background:var(--al-bg);padding:11px 13px;display:grid;gap:5px;animation:itemIn .35s ease both;position:relative;overflow:hidden}
    .alert-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--al-accent);border-radius:4px 0 0 4px}
    .alert-card-top{display:flex;align-items:flex-start;gap:9px}
    .alert-icon{width:28px;height:28px;border-radius:7px;background:var(--al-icon-bg);display:grid;place-items:center;flex-shrink:0;font-size:13px}
    .alert-body{flex:1;min-width:0}
    .alert-title{font-size:.82rem;font-weight:700;color:var(--ink);line-height:1.3;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .alert-badge{display:inline-flex;align-items:center;height:18px;padding:0 7px;border-radius:99px;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;background:var(--al-badge-bg);color:var(--al-accent)}
    .alert-desc{font-size:.76rem;color:var(--muted);margin-top:2px;line-height:1.4}
    .alert-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
    .alert-time{font-size:.7rem;color:var(--muted)}
    .alert-dismiss{font-size:.7rem;font-weight:700;color:var(--al-accent);background:none;border:none;padding:0;cursor:pointer;opacity:.7}
    .alert-dismiss:hover{opacity:1;text-decoration:underline}
    .alerts-empty{padding:18px 14px;text-align:center;color:var(--muted);font-size:.82rem}
    .alerts-empty-icon{font-size:26px;margin-bottom:6px}
    .alert-count-pill{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;border-radius:99px;background:var(--danger);color:#fff;font-size:.68rem;font-weight:800}
    .al-high{--al-bg:#fff5f6;--al-border:#fccdd4;--al-accent:#d3435c;--al-icon-bg:#fde8ec;--al-badge-bg:#fde8ec}
    .al-warn{--al-bg:#fffbf0;--al-border:#f5dfa0;--al-accent:#b87d10;--al-icon-bg:#fef4d4;--al-badge-bg:#fef4d4}
    .al-info{--al-bg:#fffdf0;--al-border:#fde68a;--al-accent:#d97706;--al-icon-bg:#fef3c7;--al-badge-bg:#fef3c7}
    .al-good{--al-bg:#f0fdf8;--al-border:#a7f0d4;--al-accent:#1f9f72;--al-icon-bg:#d1fae5;--al-badge-bg:#d1fae5}

    /* table */
    .table-wrap{max-height:340px;overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:.84rem;background:#fff}
    th,td{padding:10px 12px;border-bottom:1px solid #edf1f5;text-align:left;white-space:nowrap}
    th{position:sticky;top:0;z-index:1;background:#fef3c7;color:#405161}
    tbody tr:hover{background:#fffdf0}
    .feed{padding:8px 16px 16px;display:grid;gap:10px}
    .feed-item{border-left:4px solid var(--brand);border-radius:6px;background:#fffbeb;padding:10px 12px;color:#405161;line-height:1.4;font-size:.86rem;animation:itemIn .35s ease both}
    .footer-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;margin-top:18px}
    .mini-list{padding:16px;display:grid;gap:9px;color:#405161;font-size:.86rem}
    .mini-list span{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #edf1f5;padding-bottom:9px}
    .mini-list b{color:var(--ink);font-weight:750}
    .success-toast{position:fixed;bottom:28px;right:28px;z-index:2000;background:linear-gradient(135deg,var(--brand),#92400e);color:#fff;padding:14px 20px;border-radius:10px;font-size:.88rem;font-weight:600;box-shadow:0 18px 40px rgba(217,119,6,.3);transform:translateY(80px);opacity:0;transition:.4s cubic-bezier(.2,.8,.2,1);display:flex;align-items:center;gap:10px}
    .success-toast.show{transform:translateY(0);opacity:1}

    @keyframes cardIn{from{opacity:0;transform:translateY(18px) rotateX(14deg)}to{opacity:1;transform:translateY(0) rotateX(0)}}
    @keyframes panelRise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes itemIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
    @keyframes barGrow{from{height:0;opacity:.1}to{height:var(--target-h);opacity:1}}
    @keyframes stageFloat{0%,100%{transform:rotateX(12deg) rotateY(-4deg) translateY(0)}50%{transform:rotateX(14deg) rotateY(-2deg) translateY(-7px)}}
    @keyframes cubeFloat{0%,100%{transform:rotateX(16deg) rotateY(-18deg) translateY(0)}50%{transform:rotateX(20deg) rotateY(-12deg) translateY(-4px)}}
    @keyframes lineReveal{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
    @keyframes gaugeAnim{from{stroke-dashoffset:var(--from)}to{stroke-dashoffset:var(--to)}}

    @media(max-width:1080px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}.nav{grid-template-columns:repeat(2,1fr)}.layout,.footer-grid{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}.topbar{flex-direction:column}.tools{justify-items:start;width:100%}}
    @media(max-width:620px){main,.sidebar{padding:14px}.kpi-grid,.module-grid,.quick-actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-cube">WK</div>
      <div><h1>Worker Portal</h1><span>WageSheet · My Account</span></div>
    </div>

    <!-- Worker profile -->
    <div class="worker-profile">
      <div class="wp-avatar" data-session-initials>WU</div>
      <div class="wp-name" id="workerName" data-session-name>Worker User</div>
      <div class="wp-meta" data-session-role>Worker</div>
      <div class="wp-meta">RINL Wage Portal</div>
      <div class="wp-id">Self Service</div>
    </div>

    <div class="side-title">My Portal</div>
    <nav class="nav" id="sideNav">
      <button class="active" data-section="home"><b>My Dashboard</b><small>Wages · Attendance</small></button>
      <button data-section="attendance"><b>My Attendance</b><small>Monthly record</small></button>
      <button data-section="wageslip"><b>Wage Slip</b><small>This month · History</small></button>
      <button data-section="pf"><b>PF & ESI</b><small>My deductions</small></button>
      <button data-section="payments"><b>Payments</b><small>Received · Pending</small></button>
      <button data-section="documents"><b>My Documents</b><small>ID · ESI Card · PF</small></button>
      <button data-section="leave"><b>Leave & OT</b><small>Apply · Track</small></button>
      <button data-section="support"><b>Support</b><small>Raise query</small></button>
    </nav>
  </aside>

  <main>
    <section class="topbar">
      <div class="headline"><h2 id="pageTitle"></h2><p id="pageCopy"></p></div>
      <div class="tools">
        <input class="search" id="searchInput" placeholder="Search my records…">
        <button class="action-btn" type="button" data-logout>Logout</button>
        <div class="file-meta" id="statusBar">All up to date</div>
      </div>
    </section>

    <section class="kpi-grid" id="kpiGrid"></section>

    <section class="layout">
      <div class="stack">
        <section class="panel">
          <div class="panel-head"><div><h3 id="moduleTitle"></h3><span id="moduleHint"></span></div></div>
          <div id="moduleArea"></div>
        </section>
        <section class="panel">
          <div class="panel-head">
            <div><h3 id="chartTitle"></h3><span id="chartHint"></span></div>
            <div class="chart-controls" id="chartControls"></div>
          </div>
          <div class="analytics-stage" id="analyticsStage"></div>
        </section>
      </div>
      <aside class="stack">
        <section class="panel"><div class="panel-head"><div><h3>Quick Actions</h3><span id="actionHint"></span></div></div><div class="quick-actions" id="quickActions"></div></section>
        <section class="panel">
          <div class="panel-head">

const chartTypes=[{id:"bar3d",label:"3D Bars"},{id:"donut",label:"Donut"},{id:"line",label:"Trend"},{id:"gauge",label:"Gauges"}];
let _chartData=[];

function renderBars3D(data,el){const max=Math.max(...data.map(x=>x.value),1),bH=220;el.innerHTML=`<div class="bars3d-wrap"><div class="bars3d-stage">${data.map((x,i)=>{const h=Math.max(6,Math.round(x.value/max*100)),px=Math.round(h/100*bH),v=x.value>999?money.format(x.value):num2.format(x.value);return`<div class="bar-group"><div class="bar3d" style="height:${px}px;--c:${colors[i%colors.length]};animation:barGrow .8s cubic-bezier(.2,.8,.2,1) ${i*80}ms both;--target-h:${px}px"><div class="bar3d-front"></div><div class="bar3d-side"></div><div class="bar3d-top"></div><div class="bar3d-glow"></div><div class="bar3d-val">${esc(v)}</div></div><div class="bar3d-track"></div><div class="bar3d-label">${esc(x.label)}</div></div>`}).join("")}</div></div><div class="chart-legend">${data.slice(0,6).map((x,i)=>`<div class="legend-pill"><div class="legend-dot" style="--c:${colors[i%colors.length]}"></div>${esc(x.label)}</div>`).join("")}</div>`}
function renderDonut(data,el){const total=data.reduce((s,x)=>s+x.value,0)||1;let offset=0;const cx=80,cy=80,r=58,stroke=20,circ=2*Math.PI*r;const slices=data.map((x,i)=>{const pct=x.value/total,da=`${(pct*circ).toFixed(2)} ${circ.toFixed(2)}`,do_=(-offset*circ).toFixed(2);offset+=pct;return{...x,da,do:do_,color:colors[i%colors.length],pct:Math.round(pct*100)}});el.innerHTML=`<div class="donut3d-wrap"><div class="donut3d-canvas"><svg viewBox="0 0 160 160">${slices.map(s=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${s.da}" stroke-dashoffset="${s.do}" transform="rotate(-90 ${cx} ${cy})"/>`).join("")}<circle cx="${cx}" cy="${cy}" r="${r-stroke/2-3}" fill="white" opacity=".95"/><text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="15" font-weight="700" fill="#18212b">${data.length}</text><text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="8" fill="#697683">months</text></svg></div><div class="donut3d-legend">${slices.map(s=>`<div class="donut3d-leg-item"><div class="donut3d-leg-dot" style="background:${s.color}"></div><div class="donut3d-leg-label">${esc(s.label)}</div><div class="donut3d-leg-val">${s.pct}%</div></div>`).join("")}</div></div>`}
function renderLine(data,el){const W=500,H=200,pL=44,pR=16,pT=24,pB=34,iW=W-pL-pR,iH=H-pT-pB,max=Math.max(...data.map(x=>x.value),1);const pts=data.map((x,i)=>`${pL+i/(data.length-1||1)*iW},${pT+iH-(x.value/max)*iH}`).join(" ");el.innerHTML=`<div class="line-chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible"><defs><linearGradient id="lf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d97706" stop-opacity=".25"/><stop offset="100%" stop-color="#d97706" stop-opacity="0"/></linearGradient></defs>${[0,.25,.5,.75,1].map(t=>{const y=pT+iH*(1-t);return`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#d7e2ea" stroke-width="1" stroke-dasharray="4 4"/><text x="${pL-5}" y="${y+4}" text-anchor="end" font-size="9" fill="#697683">${Math.round(max*t/1000)}k</text>`}).join("")}<polygon points="${pts} ${pL+iW},${pT+iH} ${pL},${pT+iH}" fill="url(#lf)"/><polyline points="${pts}" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="stroke-dasharray:1000;stroke-dashoffset:1000;animation:lineReveal 1.2s ease forwards .2s"/>${data.map((x,i)=>`<circle cx="${pL+i/(data.length-1||1)*iW}" cy="${pT+iH-(x.value/max)*iH}" r="5" fill="#fff" stroke="#d97706" stroke-width="2.5"/><text x="${pL+i/(data.length-1||1)*iW}" y="${H-4}" text-anchor="middle" font-size="9" fill="#405161">${esc(x.label)}</text>`).join("")}</svg></div>`}
function renderGauges(data,el){const top4=data.slice(0,4),maxV=Math.max(...top4.map(x=>x.value),1);el.innerHTML=`<div class="gauges-wrap">${top4.map((x,i)=>{const pct=Math.round(x.value/maxV*100),r=42,c=2*Math.PI*r,dash=c*pct/100,gap=c-dash;return`<div class="gauge-item"><svg class="gauge-svg" viewBox="0 0 106 106"><circle cx="53" cy="53" r="${r}" fill="none" stroke="#fde68a" stroke-width="10"/><circle cx="53" cy="53" r="${r}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="10" stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 53 53)" style="stroke-dasharray:0 ${c.toFixed(1)};animation:gaugeAnim .9s cubic-bezier(.2,.8,.2,1) ${i*120}ms forwards;--from:${c.toFixed(1)};--to:${(c-dash).toFixed(1)}"/><text x="53" y="49" text-anchor="middle" font-size="15" font-weight="700" fill="#18212b">${pct}%</text><text x="53" y="63" text-anchor="middle" font-size="8" fill="#697683">of max</text></svg><div class="gauge-label">${esc(x.label)}</div></div>`}).join("")}</div>`}

function renderCurrentChart(){const stage=document.getElementById("analyticsStage");stage.innerHTML="";if(activeChartType==="bar3d")renderBars3D(_chartData,stage);else if(activeChartType==="donut")renderDonut(_chartData,stage);else if(activeChartType==="line")renderLine(_chartData,stage);else renderGauges(_chartData,stage)}
function renderChartControls(){document.getElementById("chartControls").innerHTML=chartTypes.map(t=>`<button class="chart-type-btn${activeChartType===t.id?" active":""}" onclick="setChartType('${t.id}')">${t.label}</button>`).join("")}
function setChartType(type){activeChartType=type;renderChartControls();renderCurrentChart();}window.setChartType=setChartType;

function renderAlerts(d){
  const now=new Date(),fmt=dt=>{const diff=Math.round((now-dt)/60000);return diff<1?"just now":diff<60?`${diff}m ago`:diff<1440?`${Math.round(diff/60)}h ago`:`${Math.round(diff/1440)}d ago`};
  const all=[
    {id:"wage_pending",sev:"warn",icon:"💰",badge:"Pending",title:"June Wage Slip Pending Approval",desc:"Your wage sheet for June is under review. Payment expected by 7th July.",time:fmt(new Date(now-1000*60*30))},
    {id:"pf_credit",sev:"good",icon:"✅",badge:"Credited",title:"May PF & ESI Credited",desc:`PF ${money.format(myData.months[4].pf)} and ESI ${money.format(myData.months[4].esi)} have been deposited.`,time:fmt(new Date(now-1000*60*1440*2))},
    {id:"attendance_ok",sev:"good",icon:"📅",badge:"Marked",title:"Attendance Marked for Today",desc:"Your attendance for today has been recorded by the contractor.",time:fmt(new Date(now-1000*60*60*6))},
    {id:"ot_pending",sev:"info",icon:"⏱️",badge:"Review",title:"Overtime Hours Under Review",desc:`${curMonth.ot} OT hours logged this month. Awaiting engineer approval.`,time:fmt(new Date(now-1000*60*200))}
  ];
  const visible=all.filter(a=>!dismissed.has(a.id));
  document.getElementById("alertCountPill").textContent=visible.filter(a=>a.sev==="high"||a.sev==="warn").length||"";
  const container=document.getElementById("alerts");
  if(!visible.length){container.innerHTML=`<div class="alerts-empty"><div class="alerts-empty-icon">🎉</div>All caught up — nothing needs your attention!</div>`;return}
  container.innerHTML=visible.map(a=>`<div class="alert-card al-${a.sev}"><div class="alert-card-top"><div class="alert-icon">${a.icon}</div><div class="alert-body"><div class="alert-title">${esc(a.title)}<span class="alert-badge">${esc(a.badge)}</span></div>${a.desc?`<div class="alert-desc">${esc(a.desc)}</div>`:""}</div></div><div class="alert-footer"><span class="alert-time">${esc(a.time)}</span><button class="alert-dismiss" onclick="dismissAlert('${esc(a.id)}')">Dismiss</button></div></div>`).join("");
}
function dismissAlert(id){dismissed.add(id);renderAlerts(myMetrics());}window.dismissAlert=dismissAlert;

function showToast(msg){const t=document.getElementById("successToast");document.getElementById("toastMsg").textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3200);}
function handleAction(action){showToast(`${action} — opening…`);}window.handleAction=handleAction;

function render(){
  const s=sections[activeSection],d=myMetrics();

  document.getElementById("pageCopy").textContent=s.copy;
  document.querySelectorAll("#sideNav button").forEach(b=>b.classList.toggle("active",b.dataset.section===activeSection));

  document.getElementById("kpiGrid").innerHTML=s.kpis(d).map((x,i)=>`<article class="kpi" style="--tone:${x[3]};animation-delay:${i*55}ms"><small>${esc(x[2])}</small><strong>${esc(x[0])}: ${esc(x[1])}</strong><span>${esc(x[2])}</span><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,16+i*13)}%;transition-delay:${i*80}ms"></div></div>${sparkSvg(x[3])}</article>`).join("");

  document.getElementById("moduleTitle").textContent=s.moduleTitle;
  document.getElementById("moduleHint").textContent=s.moduleHint;
  document.getElementById("moduleArea").innerHTML=`<div class="module-grid">${s.modules.map(m=>`<article class="module"><h4>${esc(m[0])}</h4><ul>${m[1].map(x=>`<li>${esc(x)}</li>`).join("")}</ul></article>`).join("")}</div>`;

  document.getElementById("chartTitle").textContent=s.chartTitle;
  document.getElementById("chartHint").textContent=s.chartHint;
  _chartData=s.chart();renderChartControls();renderCurrentChart();

  const cols=s.table.cols;
  document.getElementById("tableTitle").textContent=s.table.title;
  document.getElementById("tableHint").textContent=s.table.hint;
  document.getElementById("dataTable").innerHTML=`<thead><tr>${cols.map(c=>`<th>${esc(c.replace(/_/g," "))}</th>`).join("")}</tr></thead><tbody>${myData.months.map(m=>`<tr>${cols.map(c=>`<td>${esc(m[c]||"")}</td>`).join("")}</tr>`).join("")}</tbody>`;

  document.getElementById("actionHint").textContent=`${s.title} shortcuts`;
  document.getElementById("quickActions").innerHTML=s.actions.map(a=>`<button class="action-btn" onclick="handleAction('${esc(a)}')">${esc(a)}</button>`).join("");

  renderAlerts(d);

  document.getElementById("activityFeed").innerHTML=s.feed.map(f=>`<div class="feed-item">${esc(f)}</div>`).join("");

  document.getElementById("footerGrid").innerHTML=[
    ["This Month",[["Days Worked",curMonth.days],["OT Hours",curMonth.ot],["Daily Rate","₹"+curMonth.rate],["Attendance %",Math.round(curMonth.days/26*100)+"%"]]],
    ["Wages",[["Gross",money.format(curMonth.gross)],["PF Deducted",money.format(curMonth.pf)],["ESI Deducted",money.format(curMonth.esi)],["Net Wage",money.format(curMonth.net)]]],
    ["Account",[["Worker ID",myData.workerId],["Skill",myData.skill],["Department",myData.dept],["Payment",curMonth.status]]]
  ].map(b=>`<section class="panel"><div class="panel-head"><div><h3>${esc(b[0])}</h3><span>${esc(s.title)} summary</span></div></div><div class="mini-list">${b[1].map(r=>`<span>${esc(r[0])}<b>${esc(r[1])}</b></span>`).join("")}</div></section>`).join("");
}

document.querySelectorAll("#sideNav button").forEach(b=>b.addEventListener("click",()=>{activeSection=b.dataset.section;render()}));
document.getElementById("searchInput").addEventListener("input",e=>{searchText=e.target.value;render()});
render();
</script>
</body>
</html>
