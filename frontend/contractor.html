<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contractor · WageSheet</title>
  <style>
    :root {
      --ink:#18212b; --muted:#697683; --line:#d7e2ea; --brand:#7c3aed;
      --teal:#9f5cf5; --orange:#e06b45; --gold:#d99a25; --danger:#d3435c; --good:#1f9f72;
      --panel:#fbfdff; --surface:#f3eeff; --shadow:0 18px 44px rgba(18,31,43,.14);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;color:var(--ink);background:linear-gradient(135deg,#f8f5ff 0%,#efe8ff 45%,#fff8f0 100%);background-attachment:fixed}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 12% 8%,rgba(124,58,237,.17),transparent 22rem),radial-gradient(circle at 88% 10%,rgba(224,107,69,.14),transparent 20rem),linear-gradient(90deg,rgba(24,33,43,.03) 1px,transparent 1px),linear-gradient(rgba(24,33,43,.03) 1px,transparent 1px);background-size:auto,auto,72px 72px,72px 72px}
    button,input,select,textarea{font:inherit}button{cursor:pointer}
    .app{min-height:100vh;display:grid;grid-template-columns:280px minmax(0,1fr)}
    .sidebar{position:sticky;top:0;height:100vh;padding:22px 16px;background:rgba(251,253,255,.92);border-right:1px solid rgba(215,226,234,.9);backdrop-filter:blur(18px);overflow:auto;z-index:2}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:22px}
    .brand-cube{width:48px;height:48px;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:13px;background:linear-gradient(145deg,var(--brand),#3b1278 58%,#e06b45);box-shadow:0 15px 30px rgba(124,58,237,.28);transform:rotateX(16deg) rotateY(-18deg);animation:cubeFloat 5s ease-in-out infinite}
    .brand h1{margin:0;font-size:1.06rem;line-height:1.15}.brand span{color:var(--muted);font-size:.78rem}
    .user-badge{display:flex;align-items:center;gap:10px;padding:12px;background:linear-gradient(135deg,rgba(124,58,237,.08),rgba(159,92,245,.05));border-radius:10px;margin-bottom:16px;border:1px solid rgba(124,58,237,.15)}
    .user-avatar{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--teal));display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0}
    .user-info{min-width:0}.user-info b{display:block;font-size:.84rem}.user-info span{font-size:.72rem;color:var(--muted)}
    .side-title{margin:18px 8px 9px;color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em}
    .nav{display:grid;gap:5px}.nav button{width:100%;min-height:46px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--ink);text-align:left;padding:9px 10px;display:grid;gap:2px;transition:.2s ease}
    .nav button:hover,.nav button.active{background:linear-gradient(135deg,#fff,#f0e8ff);border-color:rgba(124,58,237,.22);box-shadow:0 9px 22px rgba(18,31,43,.09);transform:translateX(4px)}
    .nav small{color:var(--muted);font-size:.72rem}
    main{min-width:0;padding:24px}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px}
    .headline h2{margin:0 0 7px;font-size:clamp(1.55rem,3vw,2.5rem);line-height:1.04}.headline p{margin:0;max-width:820px;color:var(--muted);line-height:1.5}
    .tools{min-width:min(400px,100%);display:grid;gap:10px;justify-items:end}
    .search{width:100%;min-height:42px;border:1px solid var(--line);border-radius:8px;padding:0 13px;background:#fff;color:var(--ink);outline:none;box-shadow:0 10px 24px rgba(18,31,43,.06)}
    .search:focus{border-color:rgba(124,58,237,.55);box-shadow:0 0 0 4px rgba(124,58,237,.12)}
    .file-label{position:relative;min-height:42px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;padding:0 15px;color:#fff;background:linear-gradient(135deg,var(--brand),#3b1278);box-shadow:0 12px 28px rgba(124,58,237,.22);overflow:hidden}
    .file-label input{position:absolute;inset:0;opacity:0;cursor:pointer}.file-meta{font-size:.78rem;color:var(--muted);text-align:right}

    .kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(155px,1fr));gap:14px;margin-bottom:18px}
    .kpi{position:relative;min-height:130px;padding:16px;border:1px solid rgba(215,226,234,.95);border-radius:12px;background:linear-gradient(145deg,#fff,var(--surface));box-shadow:var(--shadow);animation:cardIn .55s ease both;overflow:hidden;cursor:pointer;transition:transform .3s ease,box-shadow .3s ease}
    .kpi:before{content:"";position:absolute;inset:0 0 auto;height:4px;background:linear-gradient(90deg,var(--tone),color-mix(in srgb,var(--tone) 55%,transparent))}
    .kpi:after{content:"";position:absolute;right:-22px;bottom:-22px;width:78px;height:78px;border-radius:18px;background:color-mix(in srgb,var(--tone) 13%,transparent);transform:rotate(24deg);transition:transform .3s ease}
    .kpi:hover{transform:translateY(-8px) rotateX(8deg) rotateY(-6deg);box-shadow:0 28px 60px rgba(18,31,43,.2)}
    .kpi:hover:after{transform:rotate(36deg) scale(1.15)}
    .kpi small{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:.66rem}
    .kpi strong{display:block;margin-top:13px;font-size:clamp(1.32rem,2.3vw,1.95rem);line-height:1}
    .kpi span{display:block;margin-top:9px;color:var(--muted);font-size:.82rem}
    .kpi-sparkline{position:absolute;bottom:0;left:0;right:0;height:36px;opacity:.18}
    .progress-bar{height:6px;background:#ede8ff;border-radius:3px;overflow:hidden;margin-top:5px}
    .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--brand),var(--teal));transition:width 1s cubic-bezier(.2,.8,.2,1)}

    .layout{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(310px,.7fr);gap:18px;align-items:start}
    .stack{display:grid;gap:18px}
    .panel{border:1px solid rgba(215,226,234,.95);border-radius:12px;background:rgba(251,253,255,.92);box-shadow:var(--shadow);overflow:hidden;animation:panelRise .5s ease both}
    .panel-head{min-height:62px;padding:15px 17px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,rgba(124,58,237,.07),transparent)}
    .panel-head h3{margin:0;font-size:1rem}.panel-head span{display:block;color:var(--muted);font-size:.78rem;margin-top:3px}
    .module-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:16px}
    .module{min-height:140px;border:1px solid var(--line);border-radius:10px;padding:14px;background:#fff;transition:.22s ease}
    .module:hover{transform:translateY(-4px);box-shadow:0 14px 28px rgba(18,31,43,.09)}.module h4{margin:0 0 10px;font-size:.95rem}
    .module ul{margin:0;padding:0;list-style:none;display:grid;gap:7px;color:#405161;font-size:.84rem}
    .module li:before{content:"";display:inline-block;width:7px;height:7px;border-radius:2px;background:var(--brand);margin-right:8px}
    .quick-actions{padding:16px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .action-btn{min-height:48px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:0 12px;text-align:left;transition:.2s ease;font-size:.85rem}
    .action-btn:hover{background:linear-gradient(135deg,var(--brand),#3b1278);border-color:var(--brand);color:#fff;transform:translateY(-3px);box-shadow:0 14px 25px rgba(124,58,237,.22)}

    .analytics-stage{min-height:360px;padding:0;display:flex;flex-direction:column}
    .chart-controls{display:flex;align-items:center;gap:10px;padding:14px 18px 0;flex-wrap:wrap}
    .chart-type-btn{padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:#fff;font-size:.76rem;color:var(--muted);cursor:pointer;transition:.18s ease}
    .chart-type-btn.active,.chart-type-btn:hover{background:var(--brand);color:#fff;border-color:var(--brand)}
    .bars3d-wrap{width:100%;height:290px;position:relative;perspective:900px;overflow:hidden;background:linear-gradient(180deg,rgba(124,58,237,.03),rgba(240,232,255,.5))}
    .bars3d-stage{width:100%;height:100%;transform-style:preserve-3d;transform:rotateX(12deg) rotateY(-4deg);animation:stageFloat 9s ease-in-out infinite;display:flex;align-items:flex-end;justify-content:center;gap:clamp(10px,1.8vw,22px);padding:20px 24px 44px}
    .bar-group{display:flex;flex-direction:column;align-items:center;position:relative;transform-style:preserve-3d}
    .bar3d{position:relative;width:clamp(40px,7vw,66px);transform-style:preserve-3d;border-radius:6px 6px 2px 2px;cursor:pointer;transition:filter .2s}
    .bar3d:hover{filter:brightness(1.12)}
    .bar3d-front{position:absolute;inset:0;border-radius:6px 6px 2px 2px;background:linear-gradient(180deg,color-mix(in srgb,var(--c) 78%,white) 0%,var(--c) 52%,color-mix(in srgb,var(--c) 72%,#0a1018) 100%)}
    .bar3d-side{position:absolute;top:6px;right:-13px;width:13px;bottom:0;background:color-mix(in srgb,var(--c) 62%,#0a1018);transform-origin:left;transform:skewY(48deg);border-radius:0 4px 2px 0}
    .bar3d-top{position:absolute;top:-10px;left:6px;right:0;height:10px;background:color-mix(in srgb,var(--c) 82%,white);transform-origin:bottom;transform:skewX(48deg);border-radius:4px 4px 0 0}
    .bar3d-glow{position:absolute;inset:0;border-radius:6px 6px 2px 2px;background:linear-gradient(180deg,rgba(255,255,255,.22),transparent 60%);pointer-events:none}
    .bar3d-val{position:absolute;top:-40px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.7rem;font-weight:800;padding:4px 7px;background:#fff;border:1px solid rgba(215,226,234,.9);border-radius:6px;box-shadow:0 8px 18px rgba(18,31,43,.12);color:var(--ink);opacity:0;transition:opacity .2s}
    .bar-group:hover .bar3d-val{opacity:1}
    .bar3d-track{width:100%;height:6px;border-radius:3px;background:color-mix(in srgb,var(--c) 18%,#d7e2ea);margin-top:2px}
    .bar3d-label{margin-top:12px;font-size:.7rem;font-weight:700;color:#405161;text-align:center;line-height:1.2;max-width:88px}
    .chart-legend{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;padding:10px 16px 14px}
    .legend-pill{display:inline-flex;align-items:center;gap:7px;min-height:26px;padding:3px 9px;border:1px solid var(--line);border-radius:999px;background:#fff;color:#405161;font-size:.74rem;font-weight:700}
    .legend-dot{width:10px;height:10px;border-radius:3px;background:var(--c)}
    .donut3d-wrap{width:100%;height:290px;display:flex;align-items:center;justify-content:center;gap:24px;padding:10px 16px}
    .donut3d-canvas{position:relative;width:170px;height:170px;flex-shrink:0}
    .donut3d-canvas svg{width:100%;height:100%;filter:drop-shadow(0 14px 22px rgba(18,31,43,.2))}
    .donut3d-legend{display:flex;flex-direction:column;gap:9px;flex:1;min-width:0}
    .donut3d-leg-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;transition:.18s ease}
    .donut3d-leg-item:hover{background:rgba(124,58,237,.06)}
    .donut3d-leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
    .donut3d-leg-label{font-size:.8rem;color:#405161;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .donut3d-leg-val{font-size:.8rem;font-weight:700;color:var(--ink)}
    .line-chart-wrap{width:100%;height:290px;position:relative;padding:12px 16px 8px}
    .gauges-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px}
    .gauge-item{display:flex;flex-direction:column;align-items:center;gap:6px}
    .gauge-svg{width:100%;max-width:120px}
    .gauge-label{font-size:.72rem;color:var(--muted);text-align:center}
    .bubble3d-wrap{width:100%;height:290px;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(124,58,237,.03),rgba(240,232,255,.5));perspective:1000px}
    .bubble3d-stage{position:relative;width:100%;height:100%;transform-style:preserve-3d;animation:stageFloat 10s ease-in-out infinite}
    .bubble3d{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;transition:transform .25s ease,filter .25s ease;animation:bubbleIn .6s cubic-bezier(.2,.8,.2,1) both}
    .bubble3d:hover{transform:translateZ(20px) scale(1.08);filter:brightness(1.1);z-index:5}
    .bubble3d-inner{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 32% 28%,rgba(255,255,255,.85),color-mix(in srgb,var(--c) 75%,white) 32%,var(--c) 62%,color-mix(in srgb,var(--c) 65%,#0a1018) 100%);box-shadow:inset 0 -10px 20px rgba(0,0,0,.18),0 14px 26px rgba(18,31,43,.22)}
    .bubble3d-shine{position:absolute;top:8%;left:14%;width:38%;height:30%;border-radius:50%;background:rgba(255,255,255,.55);filter:blur(3px)}
    .bubble3d-label{position:relative;z-index:2;font-size:.72rem;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.35);text-align:center;line-height:1.15;padding:0 6px;max-width:90%}
    .bubble3d-val{position:relative;z-index:2;font-size:.66rem;font-weight:700;color:rgba(255,255,255,.92);margin-top:2px}
    .bubble3d-floor{position:absolute;left:5%;right:5%;bottom:6%;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,.25),transparent)}

    .alerts{padding:10px 14px 14px;display:grid;gap:9px}
    .alert-card{border-radius:10px;border:1px solid var(--al-border);background:var(--al-bg);padding:11px 13px;display:grid;gap:5px;animation:itemIn .35s ease both;position:relative;overflow:hidden}
    .alert-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--al-accent);border-radius:4px 0 0 4px}
    .alert-card-top{display:flex;align-items:flex-start;gap:9px}
    .alert-icon{width:28px;height:28px;border-radius:7px;background:var(--al-icon-bg);display:grid;place-items:center;flex-shrink:0;font-size:13px}
    .alert-body{flex:1;min-width:0}
    .alert-title{font-size:.82rem;font-weight:700;color:var(--ink);line-height:1.3;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .alert-badge{display:inline-flex;align-items:center;height:18px;padding:0 7px;border-radius:99px;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;background:var(--al-badge-bg);color:var(--al-accent)}
    .alert-desc{font-size:.76rem;color:var(--muted);margin-top:2px;line-height:1.4}
    .alert-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
    .alert-time{font-size:.7rem;color:var(--muted)}
    .alert-dismiss{font-size:.7rem;font-weight:700;color:var(--al-accent);background:none;border:none;padding:0;cursor:pointer;opacity:.7}
    .alert-dismiss:hover{opacity:1;text-decoration:underline}
    .alerts-empty{padding:18px 14px;text-align:center;color:var(--muted);font-size:.82rem}
    .alerts-empty-icon{font-size:26px;margin-bottom:6px}
    .alert-count-pill{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;border-radius:99px;background:var(--danger);color:#fff;font-size:.68rem;font-weight:800}
    .al-high{--al-bg:#fff5f6;--al-border:#fccdd4;--al-accent:#d3435c;--al-icon-bg:#fde8ec;--al-badge-bg:#fde8ec}
    .al-warn{--al-bg:#fffbf0;--al-border:#f5dfa0;--al-accent:#b87d10;--al-icon-bg:#fef4d4;--al-badge-bg:#fef4d4}
    .al-info{--al-bg:#f5f0ff;--al-border:#d4b8ff;--al-accent:#7c3aed;--al-icon-bg:#ede8ff;--al-badge-bg:#ede8ff}
    .al-good{--al-bg:#f0fdf8;--al-border:#a7f0d4;--al-accent:#1f9f72;--al-icon-bg:#d1fae5;--al-badge-bg:#d1fae5}

    .table-wrap{max-height:360px;overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:.84rem;background:#fff}
    th,td{padding:10px 12px;border-bottom:1px solid #edf1f5;text-align:left;white-space:nowrap}
    th{position:sticky;top:0;z-index:1;background:#f3eeff;color:#405161}
    tbody tr:hover{background:#faf5ff}

    .feed{padding:8px 16px 16px;display:grid;gap:10px}
    .feed-item{border-left:4px solid var(--brand);border-radius:6px;background:#f8f5ff;padding:10px 12px;color:#405161;line-height:1.4;font-size:.86rem;animation:itemIn .35s ease both}

    .footer-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;margin-top:18px}
    .mini-list{padding:16px;display:grid;gap:9px;color:#405161;font-size:.86rem}
    .mini-list span{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #edf1f5;padding-bottom:9px}
    .mini-list b{color:var(--ink);font-weight:750}

    .success-toast{position:fixed;bottom:28px;right:28px;z-index:2000;background:linear-gradient(135deg,var(--brand),#3b1278);color:#fff;padding:14px 20px;border-radius:10px;font-size:.88rem;font-weight:600;box-shadow:0 18px 40px rgba(124,58,237,.3);transform:translateY(80px);opacity:0;transition:.4s cubic-bezier(.2,.8,.2,1);display:flex;align-items:center;gap:10px}
    .success-toast.show{transform:translateY(0);opacity:1}

    /* Wage sheet preview */
    .wagesheet-summary{padding:14px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .ws-stat{border:1px solid var(--line);border-radius:10px;padding:12px;background:#fff;text-align:center}
    .ws-stat strong{display:block;font-size:1.3rem;color:var(--ink);margin-bottom:4px}
    .ws-stat span{font-size:.76rem;color:var(--muted)}

    @keyframes cardIn{from{opacity:0;transform:translateY(18px) rotateX(14deg)}to{opacity:1;transform:translateY(0) rotateX(0)}}
    @keyframes panelRise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes itemIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
    @keyframes barGrow{from{height:0;opacity:.1}to{height:var(--target-h);opacity:1}}
    @keyframes stageFloat{0%,100%{transform:rotateX(12deg) rotateY(-4deg) translateY(0)}50%{transform:rotateX(14deg) rotateY(-2deg) translateY(-8px)}}
    @keyframes cubeFloat{0%,100%{transform:rotateX(16deg) rotateY(-18deg) translateY(0)}50%{transform:rotateX(20deg) rotateY(-12deg) translateY(-4px)}}
    @keyframes lineReveal{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
    @keyframes gaugeAnim{from{stroke-dashoffset:var(--from)}to{stroke-dashoffset:var(--to)}}
    @keyframes bubbleIn{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}

    @media(max-width:1100px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}.nav{grid-template-columns:repeat(2,1fr)}.layout,.footer-grid{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}.topbar{flex-direction:column}.tools{justify-items:start;width:100%}}
    @media(max-width:640px){main,.sidebar{padding:14px}.kpi-grid,.module-grid,.quick-actions,.wagesheet-summary{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-cube">CO</div>
      <div><h1>Contractor Portal</h1><span>WageSheet · My Workers</span></div>
    </div>
    <div class="user-badge">
      <div class="user-avatar">SC</div>
      <div class="user-info"><b id="userNameDisplay" data-session-name>Contractor User</b><span data-session-role>Contractor</span></div>
    </div>
    <div class="side-title">Navigation</div>
    <nav class="nav" id="sideNav">
      <button class="active" data-section="overview"><b>My Dashboard</b><small>Summary · KPIs</small></button>
      <button data-section="workers"><b>My Workers</b><small>Register · Manage</small></button>
      <button data-section="attendance"><b>Attendance</b><small>Mark · Submit</small></button>
      <button data-section="wagesheets"><b>Wage Sheets</b><small>Submit · Track</small></button>
      <button data-section="documents"><b>Documents</b><small>Upload · PF · ESI</small></button>
      <button data-section="payments"><b>Payments</b><small>Status · History</small></button>
      <button data-section="compliance"><b>Compliance</b><small>PF · ESI · License</small></button>
      <button data-section="support"><b>Support</b><small>Queries · Messages</small></button>
    </nav>
  </aside>

  <main>
    <section class="topbar">
      <div class="headline"><h2 id="pageTitle"></h2><p id="pageCopy"></p></div>
      <div class="tools">
        <input class="search" id="searchInput" placeholder="Search worker, wage sheet, document…">
        <label class="file-label">Upload Attendance CSV<input type="file" id="csvInput" accept=".csv"></label>
        <button class="action-btn" type="button" data-logout>Logout</button>
        <div class="file-meta" id="fileMeta">No file loaded</div>
        <div class="file-meta" id="statusBar">Ready</div>
      </div>
    </section>

    <section class="kpi-grid" id="kpiGrid"></section>

    <section class="layout">
      <div class="stack">
        <section class="panel">
          <div class="panel-head"><div><h3 id="moduleTitle"></h3><span id="moduleHint"></span></div></div>
          <div id="moduleArea"></div>
        </section>

function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function key(v){return String(v||"").trim().toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"")}
function val(r,names){for(const n of names){const k=key(n);if(r[k]!==undefined&&r[k]!=="")return r[k]}return""}
function nv(r,names){const x=Number(String(val(r,names)).replace(/[^0-9.-]/g,""));return Number.isFinite(x)?x:0}
function net(r){const d=nv(r,["net_wage","net","payable"]);if(d)return d;return nv(r,["basic_wage","gross_wage","wage"])-nv(r,["pf"])-nv(r,["esi"])||nv(r,["days"])*nv(r,["rate"])}
function filteredRows(){const s=searchText.trim().toLowerCase();return s?rows.filter(r=>Object.values(r).join(" ").toLowerCase().includes(s)):rows}
function group(data,lFn,vFn){const m=new Map();data.forEach(r=>{const l=lFn(r)||"Unknown";m.set(l,(m.get(l)||0)+vFn(r))});return[...m.entries()].map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,7)}
function parseCsv(text){const out=[];let cell="",row=[],q=false;for(let i=0;i<text.length;i++){const ch=text[i],n=text[i+1];if(ch=='"'&&q&&n=='"'){cell+='"';i++;continue}if(ch=='"'){q=!q;continue}if(ch==","&&!q){row.push(cell);cell="";continue}if((ch=="\n"||ch=="\r")&&!q){if(ch=="\r"&&n=="\n")i++;row.push(cell);if(row.some(Boolean))out.push(row);row=[];cell="";continue}cell+=ch}row.push(cell);if(row.some(Boolean))out.push(row);const heads=(out.shift()||[]).map(key);return out.map(vals=>{const r={};heads.forEach((h,i)=>r[h]=String(vals[i]||"").trim());return r})}

function metrics(data){
  const workers=data.length;
  const present=data.filter(r=>nv(r,["days","work_days"])>=23).length;
  const absent=Math.max(0,workers-present);
  const payroll=data.reduce((s,r)=>s+net(r),0);
  const gross=data.reduce((s,r)=>s+nv(r,["basic_wage","gross_wage"]),0);
  const pf=data.reduce((s,r)=>s+nv(r,["pf"]),0);
  const esi=data.reduce((s,r)=>s+nv(r,["esi"]),0);
  const overtime=data.reduce((s,r)=>s+nv(r,["overtime","ot"]),0);
  const pending=data.filter(r=>/pending/i.test(val(r,["status"]))).length;
  const approved=data.filter(r=>/approved/i.test(val(r,["status"]))).length;
  const depts=new Set(data.map(r=>val(r,["department","dept"])).filter(Boolean)).size;
  const alerts=data.filter(r=>/due|missing|expired/i.test(val(r,["compliance","remarks"]))).length;
  return{workers,present,absent,payroll,gross,pf,esi,overtime,pending,approved,depts,alerts,score:`${Math.max(78,100-alerts*5)}%`};
}

let _chartData=[];

function renderBars3D(data,el){const max=Math.max(...data.map(x=>x.value),1),bH=250;el.innerHTML=`<div class="bars3d-wrap"><div class="bars3d-stage">${data.map((x,i)=>{const h=Math.max(6,Math.round(x.value/max*100)),px=Math.round(h/100*bH),v=x.value>999?money.format(x.value):num2.format(x.value);return`<div class="bar-group"><div class="bar3d" style="height:${px}px;--c:${colors[i%colors.length]};animation:barGrow .8s cubic-bezier(.2,.8,.2,1) ${i*80}ms both;--target-h:${px}px"><div class="bar3d-front"></div><div class="bar3d-side"></div><div class="bar3d-top"></div><div class="bar3d-glow"></div><div class="bar3d-val">${esc(v)}</div></div><div class="bar3d-track"></div><div class="bar3d-label">${esc(x.label)}</div></div>`}).join("")}</div></div><div class="chart-legend">${data.slice(0,6).map((x,i)=>`<div class="legend-pill"><div class="legend-dot" style="--c:${colors[i%colors.length]}"></div>${esc(x.label)}</div>`).join("")}</div>`}
function renderDonut(data,el){const total=data.reduce((s,x)=>s+x.value,0)||1;let offset=0;const cx=85,cy=85,r=62,stroke=22,circ=2*Math.PI*r;const slices=data.map((x,i)=>{const pct=x.value/total,da=`${(pct*circ).toFixed(2)} ${circ.toFixed(2)}`,do_=(-offset*circ).toFixed(2);offset+=pct;return{...x,da,do:do_,color:colors[i%colors.length],pct:Math.round(pct*100)}});el.innerHTML=`<div class="donut3d-wrap"><div class="donut3d-canvas"><svg viewBox="0 0 170 170">${slices.map(s=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${s.da}" stroke-dashoffset="${s.do}" transform="rotate(-90 ${cx} ${cy})"/>`).join("")}<circle cx="${cx}" cy="${cy}" r="${r-stroke/2-4}" fill="white" opacity=".95"/><text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="17" font-weight="700" fill="#18212b">${data.length}</text><text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="9" fill="#697683">groups</text></svg></div><div class="donut3d-legend">${slices.map(s=>`<div class="donut3d-leg-item"><div class="donut3d-leg-dot" style="background:${s.color}"></div><div class="donut3d-leg-label">${esc(s.label)}</div><div class="donut3d-leg-val">${s.pct}%</div></div>`).join("")}</div></div>`}
function renderLine(data,el){const W=520,H=210,pL=44,pR=18,pT=26,pB=36,iW=W-pL-pR,iH=H-pT-pB,max=Math.max(...data.map(x=>x.value),1);const pts=data.map((x,i)=>`${pL+i/(data.length-1||1)*iW},${pT+iH-(x.value/max)*iH}`).join(" ");el.innerHTML=`<div class="line-chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible"><defs><linearGradient id="lf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7c3aed" stop-opacity=".25"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/></linearGradient></defs>${[0,.25,.5,.75,1].map(t=>{const y=pT+iH*(1-t);return`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#d7e2ea" stroke-width="1" stroke-dasharray="4 4"/><text x="${pL-5}" y="${y+4}" text-anchor="end" font-size="10" fill="#697683">${Math.round(max*t)}</text>`}).join("")}<polygon points="${pts} ${pL+iW},${pT+iH} ${pL},${pT+iH}" fill="url(#lf)"/><polyline points="${pts}" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="stroke-dasharray:1000;stroke-dashoffset:1000;animation:lineReveal 1.2s ease forwards .2s"/>${data.map((x,i)=>`<circle cx="${pL+i/(data.length-1||1)*iW}" cy="${pT+iH-(x.value/max)*iH}" r="5" fill="#fff" stroke="#7c3aed" stroke-width="2.5"/><text x="${pL+i/(data.length-1||1)*iW}" y="${H-5}" text-anchor="middle" font-size="9" fill="#405161">${esc(x.label.split(" ")[0])}</text>`).join("")}</svg></div>`}
function renderGauges(data,el){const top4=data.slice(0,4),maxV=Math.max(...top4.map(x=>x.value),1);el.innerHTML=`<div class="gauges-wrap">${top4.map((x,i)=>{const pct=Math.round(x.value/maxV*100),r=44,c=2*Math.PI*r,dash=c*pct/100,gap=c-dash;return`<div class="gauge-item"><svg class="gauge-svg" viewBox="0 0 110 110"><circle cx="55" cy="55" r="${r}" fill="none" stroke="#ede8ff" stroke-width="11"/><circle cx="55" cy="55" r="${r}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="11" stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 55 55)" style="stroke-dasharray:0 ${c.toFixed(1)};animation:gaugeAnim .9s cubic-bezier(.2,.8,.2,1) ${i*120}ms forwards;--from:${c.toFixed(1)};--to:${(c-dash).toFixed(1)}"/><text x="55" y="51" text-anchor="middle" font-size="16" font-weight="700" fill="#18212b">${pct}%</text><text x="55" y="65" text-anchor="middle" font-size="8" fill="#697683">of max</text></svg><div class="gauge-label">${esc(x.label)}</div></div>`}).join("")}</div>`}
function renderBubble3D(data,el){const max=Math.max(...data.map(x=>x.value),1),min=Math.min(...data.map(x=>x.value),max),n=data.length||1;el.innerHTML=`<div class="bubble3d-wrap"><div class="bubble3d-stage"><div class="bubble3d-floor"></div>${data.map((x,i)=>{const t=n>1?i/(n-1):.5,ratio=max>min?(x.value-min)/(max-min):.5,size=50+ratio*96,left=8+t*78,top=38+Math.sin(t*Math.PI*1.6+i*.7)*22,v=x.value>999?money.format(x.value):num2.format(x.value),fs=size<80?.62:1;return`<div class="bubble3d" style="width:${size}px;height:${size}px;left:${left}%;top:${top}%;--c:${colors[i%colors.length]};animation-delay:${i*90}ms"><div class="bubble3d-inner"></div><div class="bubble3d-shine"></div><div class="bubble3d-label" style="font-size:${(.72*fs).toFixed(2)}rem">${esc(x.label)}</div><div class="bubble3d-val" style="font-size:${(.66*fs).toFixed(2)}rem">${esc(v)}</div></div>`}).join("")}</div></div><div class="chart-legend">${data.slice(0,6).map((x,i)=>`<div class="legend-pill"><div class="legend-dot" style="--c:${colors[i%colors.length]}"></div>${esc(x.label)}</div>`).join("")}</div>`}

function renderCurrentChart(){const stage=document.getElementById("analyticsStage");stage.innerHTML="";if(activeChartType==="bar3d")renderBars3D(_chartData,stage);else if(activeChartType==="bubble3d")renderBubble3D(_chartData,stage);else if(activeChartType==="donut")renderDonut(_chartData,stage);else if(activeChartType==="line")renderLine(_chartData,stage);else renderGauges(_chartData,stage)}
function renderChartControls(){document.getElementById("chartControls").innerHTML=chartTypes.map(t=>`<button class="chart-type-btn${activeChartType===t.id?" active":""}" onclick="setChartType('${t.id}')">${t.label}</button>`).join("")}
function setChartType(type){activeChartType=type;renderChartControls();renderCurrentChart();}window.setChartType=setChartType;

function renderAlerts(d){
  const now=new Date(),fmt=dt=>{const diff=Math.round((now-dt)/60000);return diff<1?"just now":diff<60?`${diff}m ago`:diff<1440?`${Math.round(diff/60)}h ago`:`${Math.round(diff/1440)}d ago`};
  const all=[];
  if(d.pending>0)all.push({id:`pnd_${d.pending}`,sev:"high",icon:"📋",badge:"Action Required",title:`${d.pending} Wage Sheet(s) Need Submission`,desc:`Submit pending wage sheets to the Engineer Incharge for approval.`,time:fmt(new Date(now-1000*60*20))});
  if(d.alerts>0)all.push({id:`comp_${d.alerts}`,sev:"high",icon:"⚠️",badge:"Compliance",title:`${d.alerts} Document Issue(s) Found`,desc:"Upload missing or expired documents to maintain compliance standing.",time:fmt(new Date(now-1000*60*55))});
  all.push({id:"payroll_due",sev:"warn",icon:"💰",badge:"Payroll",title:`Payroll This Period: ${money.format(d.payroll)}`,desc:`PF: ${money.format(d.pf)}, ESI: ${money.format(d.esi)}. Ensure challans are submitted.`,time:fmt(new Date(now-1000*60*90))});
  all.push({id:"attendance_info",sev:"info",icon:"📊",badge:"Attendance",title:`Attendance: ${d.present} Present, ${d.absent} Absent`,desc:"Upload or mark attendance before the monthly deadline.",time:fmt(new Date(now-1000*60*140))});
  all.push({id:"good_workers",sev:"good",icon:"✅",badge:"Active",title:`${d.workers} Workers Deployed on Site`,desc:`Your workforce is deployed across ${d.depts} department(s).`,time:fmt(new Date(now-1000*60*200))});

  const visible=all.filter(a=>!dismissed.has(a.id));
  document.getElementById("alertCountPill").textContent=visible.filter(a=>a.sev==="high"||a.sev==="warn").length||"";
  const container=document.getElementById("alerts");
  if(!visible.length){container.innerHTML=`<div class="alerts-empty"><div class="alerts-empty-icon">🎉</div>All caught up — no pending actions!</div>`;return}
  container.innerHTML=visible.map(a=>`<div class="alert-card al-${a.sev}"><div class="alert-card-top"><div class="alert-icon">${a.icon}</div><div class="alert-body"><div class="alert-title">${esc(a.title)}<span class="alert-badge">${esc(a.badge)}</span></div>${a.desc?`<div class="alert-desc">${esc(a.desc)}</div>`:""}</div></div><div class="alert-footer"><span class="alert-time">${esc(a.time)}</span><button class="alert-dismiss" onclick="dismissAlert('${esc(a.id)}')">Dismiss</button></div></div>`).join("");
}
function dismissAlert(id){dismissed.add(id);renderAlerts(metrics(filteredRows()));}window.dismissAlert=dismissAlert;

function showToast(msg){const t=document.getElementById("successToast");document.getElementById("toastMsg").textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3200);}
function handleAction(action){
  const t=action.toLowerCase();
  if(t.includes("csv")||t.includes("upload attendance")){document.getElementById("csvInput").click();return}
  if(t.includes("export")||t.includes("download")||t.includes("pdf")){
    const blob=new Blob([Object.keys(filteredRows()[0]||{worker_id:"",name:""}).join(",")+"\n"+filteredRows().map(r=>Object.values(r).map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n")],{type:"text/csv"});
    const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=`${activeSection}-report.csv`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);showToast("Downloaded");return}
  showToast(`${action} — opening…`);
}
window.handleAction=handleAction;

function render(){
  const s=sections[activeSection],data=filteredRows(),d=metrics(data);
  document.getElementById("pageTitle").textContent=s.title;
  document.getElementById("pageCopy").textContent=s.copy;
  document.getElementById("fileMeta").textContent=fileName?`${fileName} loaded`:"No CSV loaded";
  document.querySelectorAll("#sideNav button").forEach(b=>b.classList.toggle("active",b.dataset.section===activeSection));
  document.getElementById("kpiGrid").innerHTML=s.kpis(d).map((x,i)=>`<article class="kpi" style="--tone:${x[3]};animation-delay:${i*55}ms"><small>${esc(x[2])}</small><strong>${esc(x[0])}: ${esc(x[1])}</strong><span>${esc(x[2])}</span><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,16+i*13)}%;transition-delay:${i*80}ms"></div></div>${sparkSvg(x[3])}</article>`).join("");
  document.getElementById("moduleTitle").textContent=s.moduleTitle;
  document.getElementById("moduleHint").textContent=s.moduleHint;
  document.getElementById("moduleArea").innerHTML=`<div class="module-grid">${s.modules.map(m=>`<article class="module"><h4>${esc(m[0])}</h4><ul>${m[1].map(x=>`<li>${esc(x)}</li>`).join("")}</ul></article>`).join("")}</div>`;
  document.getElementById("chartTitle").textContent=s.chartTitle;
  document.getElementById("chartHint").textContent=s.chartHint;
  _chartData=s.chart(data);renderChartControls();renderCurrentChart();
  const cols=s.table.cols;
  document.getElementById("tableTitle").textContent=s.table.title;
  document.getElementById("tableHint").textContent=s.table.hint;
  const tRows=data.slice(0,100);
  document.getElementById("dataTable").innerHTML=tRows.length?`<thead><tr>${cols.map(c=>`<th>${esc(c.replace(/_/g," "))}</th>`).join("")}</tr></thead><tbody>${tRows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c]||"")}</td>`).join("")}</tr>`).join("")}</tbody>`:`<tbody><tr><td colspan="${cols.length}">No records yet. Upload your attendance CSV to begin.</td></tr></tbody>`;
  document.getElementById("actionHint").textContent=`${s.title} shortcuts`;
  document.getElementById("quickActions").innerHTML=s.actions.map(a=>`<button class="action-btn" onclick="handleAction('${esc(a)}')">${esc(a)}</button>`).join("");
  renderAlerts(d);
  const feed=[...activityLog.slice(0,2),...s.feed].slice(0,5);
  document.getElementById("activityFeed").innerHTML=feed.map(f=>`<div class="feed-item">${esc(f)}</div>`).join("");
  document.getElementById("footerGrid").innerHTML=[
    ["Workers",[["Total",d.workers],["Present",d.present],["Absent",d.absent],["Overtime",num2.format(d.overtime)]]],
    ["Payroll",[["Net Payroll",money.format(d.payroll)],["Gross",money.format(d.gross)],["PF",money.format(d.pf)],["ESI",money.format(d.esi)]]],
    ["Status",[["Approved",d.approved],["Pending",d.pending],["Compliance",d.score],["Departments",d.depts]]]
  ].map(b=>`<section class="panel"><div class="panel-head"><div><h3>${esc(b[0])}</h3><span>${esc(s.title)} summary</span></div></div><div class="mini-list">${b[1].map(r=>`<span>${esc(r[0])}<b>${esc(r[1])}</b></span>`).join("")}</div></section>`).join("");
}

document.querySelectorAll("#sideNav button").forEach(b=>b.addEventListener("click",()=>{activeSection=b.dataset.section;render()}));
document.getElementById("searchInput").addEventListener("input",e=>{searchText=e.target.value;render()});
document.getElementById("csvInput").addEventListener("change",e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{rows=parseCsv(String(reader.result||""));fileName=file.name;document.getElementById("statusBar").textContent=`Loaded: ${rows.length} records`;activityLog.unshift(`CSV uploaded: ${file.name}`);render()};reader.readAsText(file)});
render();
</script>
</body>
</html>
